<style>
*{margin:0;padding:0;box-sizing:border-box;}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Segoe UI', 'Helvetica Neue', sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;
    position:relative;
}

/* ANIMATED BACKGROUND */
.animated-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(-45deg, #000000, #0a0520, #0f0f2e, #000000);
    background-size:400% 400%;
    animation:gradient-shift 15s ease infinite;
    z-index:-3;
}

@keyframes gradient-shift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.orb-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.4;
    mix-blend-mode:screen;
}

.orb-purple{
    width:400px;
    height:400px;
    background:radial-gradient(circle, #7c3aed, #6c63ff, transparent);
    top:-100px;
    left:-50px;
    animation:orb-move-1 20s ease-in-out infinite;
}

.orb-pink{
    width:350px;
    height:350px;
    background:radial-gradient(circle, #ec4899, #ff006e, transparent);
    bottom:-100px;
    right:-50px;
    animation:orb-move-2 25s ease-in-out infinite;
}

.orb-cyan{
    width:380px;
    height:380px;
    background:radial-gradient(circle, #06b6d4, #00d9ff, transparent);
    top:30%;
    right:-100px;
    animation:orb-move-3 22s ease-in-out infinite;
}

.orb-violet{
    width:320px;
    height:320px;
    background:radial-gradient(circle, #8b5cf6, #a78bfa, transparent);
    bottom:15%;
    left:10%;
    animation:orb-move-4 23s ease-in-out infinite;
}

@keyframes orb-move-1{
    0%{transform:translate(0px, 0px) scale(1);}
    25%{transform:translate(100px, 50px) scale(1.1);}
    50%{transform:translate(50px, 150px) scale(0.95);}
    75%{transform:translate(-50px, 80px) scale(1.05);}
    100%{transform:translate(0px, 0px) scale(1);}
}

@keyframes orb-move-2{
    0%{transform:translate(0px, 0px) scale(1);}
    25%{transform:translate(-80px, -100px) scale(1.05);}
    50%{transform:translate(-120px, -50px) scale(0.9);}
    75%{transform:translate(-40px, -80px) scale(1.1);}
    100%{transform:translate(0px, 0px) scale(1);}
}

@keyframes orb-move-3{
    0%{transform:translate(0px, 0px) scale(1);}
    33%{transform:translate(-80px, 100px) scale(1.08);}
    66%{transform:translate(60px, -100px) scale(0.95);}
    100%{transform:translate(0px, 0px) scale(1);}
}

@keyframes orb-move-4{
    0%{transform:translate(0px, 0px) scale(1);}
    25%{transform:translate(100px, -80px) scale(0.98);}
    50%{transform:translate(-60px, -120px) scale(1.1);}
    75%{transform:translate(80px, -40px) scale(1);}
    100%{transform:translate(0px, 0px) scale(1);}
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{
    0%, 100%{opacity:0.3;}
    50%{opacity:1;}
}

/* NAV */
.nav{
    position:fixed;
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(30px);
    z-index:100;
    border-bottom:1px solid rgba(124,58,237,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.logo{
    font-weight:900;
    font-size:24px;
    background:linear-gradient(135deg, #7c3aed, #ec4899, #06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:2px;
    cursor:pointer;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:40px;
}

.nav-right a{
    color:#cbd5e1;
    text-decoration:none;
    transition:all 0.3s ease;
    position:relative;
    font-weight:600;
    font-size:15px;
}

.nav-right a:hover{
    color:#7c3aed;
}

.nav-right a::after{
    content:'';
    position:absolute;
    bottom:-8px;
    left:0;
    width:0;
    height:2px;
    background:linear-gradient(90deg, #7c3aed, #ec4899);
    transition:width 0.3s ease;
}

.nav-right a:hover::after{
    width:100%;
}

.lang select{
    background:rgba(30,30,50,0.8);
    color:white;
    border:1.5px solid rgba(124,58,237,0.5);
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.3s ease;
    font-weight:600;
}

.lang select:hover{
    border-color:#7c3aed;
    background:rgba(124,58,237,0.2);
}

/* PAGES */
.page{
    display:none;
}

.page.active{
    display:block;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    padding-top:100px;
}

.hero::before{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:800px;
    height:800px;
    background:radial-gradient(circle, rgba(124,58,237,0.15), transparent);
    filter:blur(80px);
    animation:pulse-big 6s ease-in-out infinite;
    pointer-events:none;
}

@keyframes pulse-big{
    0%,100%{transform:translate(-50%, -50%) scale(1);}
    50%{transform:translate(-50%, -50%) scale(1.3);}
}

.hero-content{
    z-index:5;
    max-width:900px;
    animation:slide-up 0.8s ease-out 0.2s both;
}

@keyframes slide-up{
    from{
        opacity:0;
        transform:translateY(60px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero h1{
    font-size:70px;
    font-weight:900;
    line-height:1.15;
    margin-bottom:20px;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:-1px;
}

.hero p{
    margin-top:20px;
    color:#a0aec0;
    font-size:20px;
    letter-spacing:0.5px;
    font-weight:500;
}

.download-btn, .back-btn, .review-btn, .delete-btn, .reply-btn, .auth-btn{
    margin-top:50px;
    padding:20px 50px;
    border-radius:50px;
    border:2px solid #7c3aed;
    background:rgba(124,58,237,0.1);
    color:white;
    cursor:pointer;
    font-size:18px;
    font-weight:700;
    transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position:relative;
    overflow:hidden;
    letter-spacing:0.5px;
}

.download-btn::before, .back-btn::before, .review-btn::before, .delete-btn::before, .reply-btn::before, .auth-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg, #7c3aed, #ec4899);
    transition:left 0.4s ease;
    z-index:-1;
}

.download-btn:hover::before, .back-btn:hover::before, .review-btn:hover::before, .delete-btn:hover::before, .reply-btn:hover::before, .auth-btn:hover::before{
    left:0;
}

.download-btn:hover, .back-btn:hover, .review-btn:hover, .delete-btn:hover, .reply-btn:hover, .auth-btn:hover{
    border-color:#ec4899;
    box-shadow:0 0 50px rgba(124,58,237,0.6), 0 0 25px rgba(236,72,153,0.4);
    transform:translateY(-5px) scale(1.05);
}

.download-btn:active, .back-btn:active, .review-btn:active, .delete-btn:active, .reply-btn:active, .auth-btn:active{
    transform:translateY(-2px) scale(1.02);
}

.back-btn{
    margin-top:30px;
    margin-right:20px;
    border-color:#06b6d4;
}

.back-btn::before{
    background:linear-gradient(90deg, #06b6d4, #7c3aed);
}

.back-btn:hover{
    border-color:#7c3aed;
}

.delete-btn{
    margin-top:10px;
    padding:10px 20px;
    font-size:14px;
    border-color:#ef4444;
    background:rgba(239,68,68,0.1);
}

.delete-btn::before{
    background:linear-gradient(90deg, #ef4444, #dc2626);
}

.delete-btn:hover{
    border-color:#dc2626;
    box-shadow:0 0 30px rgba(239,68,68,0.4);
}

.reply-btn{
    margin-top:10px;
    padding:10px 20px;
    font-size:14px;
    border-color:#06b6d4;
}

.reply-btn::before{
    background:linear-gradient(90deg, #06b6d4, #7c3aed);
}

#download-status{
    margin-top:25px;
    color:#7c3aed;
    font-size:16px;
    min-height:24px;
    font-weight:600;
    animation:fade-in 0.5s ease;
}

@keyframes fade-in{
    from{opacity:0;}
    to{opacity:1;}
}

/* FEATURE PAGE */
.feature-page{
    min-height:100vh;
    padding:120px 40px;
    text-align:center;
}

.feature-page h1{
    font-size:55px;
    margin-bottom:30px;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    font-weight:900;
}

.feature-page p{
    font-size:20px;
    color:#a0aec0;
    max-width:800px;
    margin:0 auto 40px;
    line-height:1.8;
}

.feature-details{
    background:rgba(30,30,50,0.4);
    border:2px solid rgba(124,58,237,0.3);
    border-radius:25px;
    padding:50px;
    max-width:800px;
    margin:40px auto;
    backdrop-filter:blur(20px);
}

.feature-details li{
    text-align:left;
    margin:20px 0;
    color:#cbd5e1;
    font-size:18px;
}

.feature-details li::before{
    content:'✓ ';
    color:#7c3aed;
    font-weight:900;
    margin-right:10px;
}

/* REVIEWS SECTION */
.reviews-section{
    padding:120px 20px;
    position:relative;
    z-index:5;
}

.reviews-section h2{
    font-size:55px;
    margin-bottom:80px;
    font-weight:900;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-align:center;
}

.reviews-container{
    max-width:1000px;
    margin:0 auto;
}

.review-card{
    background:rgba(30,30,50,0.4);
    border:2px solid rgba(124,58,237,0.3);
    border-radius:20px;
    padding:30px;
    margin-bottom:30px;
    backdrop-filter:blur(20px);
    transition:all 0.3s ease;
}

.review-card:hover{
    border-color:#7c3aed;
    transform:translateX(10px);
}

.review-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:15px;
}

.review-author-section{
    display:flex;
    align-items:center;
    gap:15px;
}

.user-avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #7c3aed;
}

.review-info{
    display:flex;
    flex-direction:column;
}

.review-author{
    font-weight:700;
    color:#7c3aed;
    font-size:16px;
}

.creator-badge{
    background:linear-gradient(135deg, #ec4899, #7c3aed);
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    color:white;
    display:inline-block;
    width:fit-content;
    margin-top:3px;
}

.review-date{
    color:#64748b;
    font-size:13px;
    margin-top:3px;
}

.review-rating{
    color:#fbbf24;
    margin-bottom:10px;
    font-size:18px;
    letter-spacing:2px;
}

.review-text{
    color:#cbd5e1;
    line-height:1.6;
    margin-bottom:15px;
}

.review-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.delete-btn{
    margin:0;
    padding:8px 16px;
    font-size:13px;
}

.reply-btn{
    margin:0;
    padding:8px 16px;
    font-size:13px;
}

/* REPLIES */
.replies-section{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(124,58,237,0.2);
}

.reply-card{
    background:rgba(17,17,17,0.6);
    border-left:3px solid #06b6d4;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    margin-left:20px;
    display:flex;
    gap:15px;
}

.reply-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid #06b6d4;
    flex-shrink:0;
}

.reply-content{
    flex:1;
}

.reply-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    gap:10px;
}

.reply-author{
    font-weight:700;
    color:#06b6d4;
}

.reply-date{
    font-size:12px;
    color:#64748b;
}

.reply-text{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.5;
}

/* AUTH FORM */
.auth-form-container{
    max-width:600px;
    margin:40px auto;
    background:rgba(30,30,50,0.4);
    border:2px solid rgba(124,58,237,0.3);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(20px);
}

.auth-form-container h3{
    font-size:24px;
    margin-bottom:30px;
    color:#fff;
    font-weight:700;
}

.form-group{
    margin-bottom:25px;
    text-align:left;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    color:#cbd5e1;
    font-weight:600;
}

.form-group input, .form-group textarea, .form-group select{
    width:100%;
    padding:12px;
    background:rgba(17,17,17,0.8);
    border:2px solid rgba(124,58,237,0.3);
    border-radius:10px;
    color:white;
    font-family:inherit;
    transition:all 0.3s ease;
}

.form-group input:focus, .form-group textarea:focus, .form-group select:focus{
    outline:none;
    border-color:#7c3aed;
    box-shadow:0 0 20px rgba(124,58,237,0.3);
}

.form-group textarea{
    resize:vertical;
    min-height:120px;
}

.avatar-preview{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-top:10px;
    border:2px solid #7c3aed;
    object-fit:cover;
}

.submit-btn{
    width:100%;
    margin-top:0;
}

.submit-reply-btn{
    padding:12px 30px;
    margin-top:15px;
}

.form-toggle{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.form-toggle a{
    color:#7c3aed;
    cursor:pointer;
    text-decoration:underline;
}

.form-toggle a:hover{
    color:#ec4899;
}

.error-msg{
    background:rgba(239,68,68,0.2);
    border:1px solid #ef4444;
    color:#fca5a5;
    padding:12px;
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

.success-msg{
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
    color:#86efac;
    padding:12px;
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

.divider{
    text-align:center;
    margin:20px 0;
    color:#64748b;
    position:relative;
}

.divider::before{
    content:'';
    position:absolute;
    left:0;
    top:50%;
    width:45%;
    height:1px;
    background:rgba(124,58,237,0.3);
}

.divider::after{
    content:'';
    position:absolute;
    right:0;
    top:50%;
    width:45%;
    height:1px;
    background:rgba(124,58,237,0.3);
}

/* REVIEW FORM */
.review-form-container{
    max-width:600px;
    margin:40px auto;
    background:rgba(30,30,50,0.4);
    border:2px solid rgba(124,58,237,0.3);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(20px);
}

.review-form-container h3{
    font-size:24px;
    margin-bottom:30px;
    color:#fff;
    font-weight:700;
}

.submit-review-btn{
    width:100%;
    margin-top:0;
}

/* SECTION */
.section{
    padding:120px 20px;
    text-align:center;
    position:relative;
    z-index:5;
}

.section h2{
    font-size:55px;
    margin-bottom:80px;
    font-weight:900;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:-1px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:40px;
    max-width:1100px;
    margin:auto;
}

.card{
    background:rgba(30,30,50,0.4);
    padding:50px 30px;
    border-radius:25px;
    border:2px solid rgba(124,58,237,0.3);
    backdrop-filter:blur(20px);
    transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.1));
    transition:left 0.4s ease;
    z-index:0;
}

.card::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:2px;
    background:linear-gradient(135deg, #7c3aed, #ec4899, transparent);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
}

.card:hover::before{
    left:0;
}

.card:hover::after{
    opacity:1;
}

.card:hover{
    border-color:#7c3aed;
    transform:translateY(-15px);
    box-shadow:0 30px 60px rgba(124,58,237,0.2), inset 0 0 30px rgba(124,58,237,0.1);
}

.card-content{
    font-size:22px;
    font-weight:700;
    position:relative;
    z-index:1;
}

/* SUPPORT */
.support{
    text-align:center;
    padding:100px 20px;
    position:relative;
    z-index:5;
}

.support h3{
    font-size:48px;
    margin-bottom:40px;
    font-weight:900;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:-1px;
}

.support a{
    display:inline-block;
    background:linear-gradient(135deg, #ec4899, #7c3aed);
    padding:18px 45px;
    border-radius:50px;
    color:white;
    text-decoration:none;
    font-weight:700;
    transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border:2px solid transparent;
    box-shadow:0 10px 30px rgba(236,72,153,0.3);
    letter-spacing:0.5px;
}

.admin-section.show{

/* MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background-color:rgba(0,0,0,0.9);
    animation:fadeIn 0.3s ease;
}

.modal.show{
    display:flex;
    align-items:center;
    justify-content:center;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.modal-content{
    background:rgba(30,30,50,0.95);
    border:2px solid rgba(124,58,237,0.5);
    border-radius:25px;
    padding:50px;
    max-width:500px;
    width:90%;
    backdrop-filter:blur(20px);
    text-align:center;
    max-height:90vh;
    overflow-y:auto;
}

.modal-content h2{
    font-size:32px;
    margin-bottom:20px;
    background:linear-gradient(135deg, #ffffff 0%, #7c3aed 50%, #ec4899 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.modal-content p{
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:16px;
}

.close-modal{
    color:#cbd5e1;
    float:right;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    transition:color 0.3s ease;
}

.close-modal:hover{
    color:#7c3aed;
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h1{font-size:45px;}

    .nav{padding:15px 20px;}

    .grid{grid-template-columns:1fr;}
    .card{padding:40px 20px;}

    .review-header{flex-direction:column;align-items:flex-start;}
    .modal-content{padding:30px;}
    .auth-form-container{padding:30px;}
}
