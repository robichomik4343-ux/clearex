<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearEx Version 1.0 - Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }

        .version {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 30px;
            font-weight: 600;
            text-align: center;
        }

        .description {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
        }

        .features {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .features h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .features ul {
            list-style: none;
        }

        .features li {
            color: #555;
            padding: 8px 0;
            display: flex;
            align-items: center;
        }

        .features li:before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
            font-size: 18px;
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            margin-bottom: 15px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .info {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 20px;
        }

        .support-corner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ff6b6b;
            color: white;
            padding: 12px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
            font-size: 14px;
        }

        .support-corner:hover {
            background: #ff5252;
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
            .logo {
                font-size: 36px;
            }
            .support-corner {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <h1>ClearEx</h1>
        <div class="version">Version 1.0</div>
        <p class="description">Your professional application for Windows. Fast, reliable, and easy to use.</p>

        <div class="features">
            <h3>✨ Features</h3>
            <ul>
                <li>Lightning fast performance</li>
                <li>User-friendly interface</li>
                <li>Automatic update checking</li>
                <li>Secure and optimized</li>
            </ul>
        </div>

        <button class="download-btn" onclick="downloadApp()">📥 Download Now</button>

        <div class="info">
            <p>🔄 Automatic updates available | 💻 Windows only</p>
        </div>
    </div>

    <a href="https://tipply.pl/@anarchiczny_2" target="_blank" class="support-corner">💝 Wspomóż nas</a>

    <script>
        function downloadApp() {
            alert('Download link coming soon! Application is still in development.');
        }
    </script>
</body>
</html>
